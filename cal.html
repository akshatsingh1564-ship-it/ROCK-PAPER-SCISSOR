<!doctype html>
<html lang ="en">
    <head>
        <meta charset = "UTF-8">
        <meta name = "viewport" content="width = device-width , initial-scale= 1.0">
        <title>Calculator</title>
        <link rel="stylesheet" href = "cal.css">
    </head>
    <body>
        <div id = "container">
            <div class = "display"></div>
            <div id ="buttons">
                <button id = "one">1</button>
                <button id = "two">2</button>
                <button id = "three">3</button>
                <button id = "four">4</button>
                <button id = "five">5</button>
                <button id = "six">6</button>
                <button id = "seven">7</button>
                <button id = "eight">8</button>
                <button id = "nine">9</button>
                <button id = "zero">0</button>
                <button id="addition">+</button>
                <button id="subtract">-</button>
                <button id="multiply">*</button>
                <button id="divide">/</button><button id = "equals">=</button>
                <button id = "clear">clear</button>
            </div>
        </div>
        <script>
            const add = function (a,b) {
                return a + b 
            }
            const subtract = function(a,b){
                return a - b
            }
            const multiply = function(a,b){
                return a*b
            }
            const divide = function(a,b){
                return a/b
            }


            let firstNum = "";
            let secondNum = "";
            let operator = "";
            let result = "";

            function operate( firstNum, operator , secondNum) {
                if(operator === '+') {
                    result  = Number(firstNum) + Number(secondNum);
                    return result; 
                }
                if(operator === '-') {
                    result =  Number(firstNum) - Number(secondNum);
                    return result ;
                }
                if(operator === '*') {
                    result = Number(firstNum)*Number(secondNum);
                    return result; 
                }
                if(operator === '/') {
                    result = Number(firstNum)/Number(secondNum);
                    return result; 
                }
            }

            const display = document.querySelector(".display");
            const buttonOne = document.querySelector("#one");
            const buttonTwo = document.querySelector("#two");
            const buttonThree = document.querySelector("#three");
            const buttonFour = document.querySelector("#four");
            const buttonFive= document.querySelector("#five");
            const buttonSix= document.querySelector("#six");
            const buttonSeven = document.querySelector("#seven");
            const buttonEight = document.querySelector("#eight");
            const buttonNine = document.querySelector("#nine");
            const buttonZero = document.querySelector("#zero");

            const buttonAdd = document.querySelector("#addition");
            const buttonSub = document.querySelector("#subtract");;
            const buttonMul = document.querySelector("#multiply");
            const buttonDiv = document.querySelector("#divide");
            const executor = document.querySelector("#equals");
            const reset = document.querySelector("#clear");

            function changeNumInput(a){
                if(operator === "") {
                    if(firstNum === result) {
                        firstNum = a;
                        display.textContent = firstNum;
                    }else{
                        firstNum = firstNum + String(a);
                        display.textContent = firstNum;
                    }
                }
                else {
                    secondNum = secondNum  + String(a);
                    display.textContent = firstNum + operator + secondNum;
                } ;   
            }

            function fillOperator(b){
                if(firstNum === ""){
                    alert("Please enter the first number !");
                    return;
                }    
                if(operator === ""){
                    operator = b;
                    display.textContent = firstNum + operator;
                } else{
                    firstNum = operate(firstNum , operator , secondNum);
                    secondNum = "";
                    operator = b;
                    display.textContent = firstNum + operator; 
                }
            };
            

            function clearAll() {
                 firstNum = "";
                 secondNum = "";
                 operator = "";
                 result = 0;
                 display.textContent = "0";
            }

            buttonOne.addEventListener("click" , (event) =>{changeNumInput(1);});
            buttonTwo.addEventListener("click" , (event) =>{changeNumInput(2);});
            buttonThree.addEventListener("click" , (event) =>{changeNumInput(3);});
            buttonFour.addEventListener("click" , (event) =>{changeNumInput(4);});
            buttonFive.addEventListener("click" , (event) =>{changeNumInput(5);});
            buttonSix.addEventListener("click" , (event) =>{changeNumInput(6);});
            buttonSeven.addEventListener("click" , (event) =>{changeNumInput(7);});
            buttonEight.addEventListener("click" , (event) =>{changeNumInput(8);});
            buttonNine.addEventListener("click" , (event) =>{changeNumInput(9);});
            buttonZero.addEventListener("click" , (event) =>{changeNumInput(0);});
            buttonAdd.addEventListener("click", (event) => {fillOperator("+");});
            buttonSub.addEventListener("click" , (event) => {fillOperator("-");});
            buttonMul.addEventListener("click" ,(event) => {fillOperator("*");});
            buttonDiv.addEventListener("click" ,(event) => {fillOperator("/");});
            executor.addEventListener("click" , (event) => {
                result = operate(Number(firstNum),operator,Number(secondNum))
                display.textContent = result;
            });
            reset.addEventListener("click", clearAll);


            


            


        </script>
        <div id ="footer">
            <h1>Copyright @ github</h1>
        </div>
    </body>
</html>
